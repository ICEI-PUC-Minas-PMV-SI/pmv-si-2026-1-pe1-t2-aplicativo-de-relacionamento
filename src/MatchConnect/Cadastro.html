<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Usuário | MatchConnect</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #FD51B3 0%, #8652F5 55%, #5EBBF6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
    }

    .cadastro-card {
      background: #ffffff;
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.2);
    }

    .cadastro-card h1 {
      color: #3d2d7a;
      font-weight: 700;
    }

    .btn-cadastro {
      background-color: #3f7cff;
      color: #fff;
      border-radius: 30px;
      font-weight: 600;
      padding: 12px;
    }

    .btn-cadastro:hover {
      background-color: #2f68df;
      color: #fff;
    }

    .link-login {
      color: #8652F5;
      font-weight: 600;
      text-decoration: none;
    }

    .link-login:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <main class="cadastro-card">
    <div class="text-center mb-4">
      <img src="Img/MatchConnectLOGO.PNG" alt="MatchConnect Logo" style="max-width: 180px; width: 100%; height: auto; margin-bottom: 20px;">
      <h1>Criar conta</h1>
      <p class="text-muted mb-0">Entre no MatchConnect e encontre conexões reais.</p>
    </div>

    <form id="formCadastro" action="CadastroInteresses.html">
      <div class="mb-3">
        <label for="nome" class="form-label">Nome completo</label>
        <input type="text" class="form-control" id="nome" placeholder="Digite seu nome">
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">E-mail</label>
        <input type="email" class="form-control" id="email" placeholder="Digite seu e-mail">
      </div>

      <div class="mb-3">
        <label for="dataNascimento" class="form-label">Data de nascimento</label>
        <input type="date" class="form-control" id="dataNascimento">
      </div>

      <div class="mb-3">
        <label for="senha" class="form-label">Senha</label>
        <input type="password" class="form-control" id="senha" placeholder="Crie uma senha">
      </div>

      <div class="mb-3">
        <label for="confirmarSenha" class="form-label">Confirmar senha</label>
        <input type="password" class="form-control" id="confirmarSenha" placeholder="Confirme sua senha">
      </div>

      <div class="form-check mb-4">
        <input class="form-check-input" type="checkbox" id="termos">
        <label class="form-check-label" for="termos">
          Confirmar os
          <a href="Termos_e_contratos.html" class="link-login">termos e contratos</a>
        </label>
      </div>

      <button type="submit" class="btn btn-cadastro w-100">
        Criar usuário
      </button>
    </form>

    <p id="mensagem" class="text-center fw-semibold"></p>
    Já tem uma conta?
    <a href="Homeusuario.html" class="link-login">Entrar</a>
    </p>
    <p id="mensagem" class="text-center fw-semibold"></p>
    Voltar para tela inicial
    <a href="index.html" class="link-login">Voltar</a>
    </p>

    <footer class="text-center text-muted mt-4" style="font-size: 0.85rem;">
      © 2026 MatchConnect
    </footer>
  </main>
  <script src="Cadas.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
