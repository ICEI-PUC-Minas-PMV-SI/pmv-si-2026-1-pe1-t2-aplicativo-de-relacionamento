<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interesses | MatchConnect</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #FD51B3 0%, #8652F5 55%, #5EBBF6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }

        .cadastro-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.2);
        }

        .cadastro-card h2 {
            color: #3d2d7a;
            font-weight: 700;
        }

        .btn-interesse {
            border: 2px solid #8652F5;
            color: #8652F5;
            border-radius: 30px;
            font-weight: 600;
            margin: 6px;
        }

        .btn-check:checked+.btn-interesse {
            background-color: #8652F5;
            color: white;
        }

        .btn-cadastro {
            background-color: #3f7cff;
            color: #fff;
            border-radius: 30px;
            font-weight: 600;
            padding: 12px;
        }

        .btn-cadastro:hover {
            background-color: #2f68df;
            color: #fff;
        }
    </style>
</head>

<body>

  <main class="cadastro-card container mt-4">

    <h2 class="text-center mb-4">Complete seu perfil</h2>

    <form id="formInteresses">

      <!-- Nome -->
      <div class="mb-2">
        <input type="text" class="form-control" placeholder="Nome">
      </div>

      <!-- Sexo e Gênero -->
      <div class="row mb-2">
        <div class="col">
          <input type="text" class="form-control" placeholder="Sexo">
        </div>
        <div class="col">
          <input type="text" class="form-control" placeholder="Gênero">
        </div>
      </div>

      <!-- Idade -->
      <div class="mb-2">
        <input type="number" class="form-control" placeholder="Idade">
      </div>

      <!-- Localização -->
      <div class="mb-2">
        <input type="text" class="form-control" placeholder="Localização">
      </div>

      <!-- Aniversário -->
      <div class="mb-2">
        <input type="date" class="form-control">
      </div>

      <!-- Religião -->
      <div class="mb-2">
        <input type="text" class="form-control" placeholder="Religião">
      </div>

      <!-- Intenção e Situação -->
      <div class="row mb-2">
        <div class="col">
          <input type="text" class="form-control" placeholder="Intenção no aplicativo">
        </div>
        <div class="col">
          <input type="text" class="form-control" placeholder="Situação Atual">
        </div>
      </div>

      <!-- Idiomas -->
      <div class="mb-2">
        <input type="text" class="form-control" placeholder="Idiomas">
      </div>

      <!-- Escolaridade -->
      <div class="mb-2">
        <input type="text" class="form-control" placeholder="Maior nível de escolaridade">
      </div>

      <!-- Profissão -->
      <div class="mb-2">
        <input type="text" class="form-control" placeholder="Profissão">
      </div>

      <!-- Bebida e Fuma -->
      <div class="row mb-2">
        <div class="col">
          <input type="text" class="form-control" placeholder="Bebe?">
        </div>
        <div class="col">
          <input type="text" class="form-control" placeholder="Fuma?">
        </div>
      </div>

      <!-- Fotos -->
      <div class="mb-3">
        <label class="form-label">Adicionar fotos</label>
        <input type="file" class="form-control">
      </div>

      <!-- Assistente -->
      <div class="mb-3">
        <textarea class="form-control" rows="3" placeholder="Assistente Virtual - Mapeamento de Interesses"></textarea>
      </div>

      <h5 class="mb-3">Escolha pelo menos 3 interesses:</h5>

      <div class="mb-4">
        <input type="checkbox" class="btn-check" id="musica" value="Música">
        <label class="btn btn-interesse" for="musica">Música</label>

        <input type="checkbox" class="btn-check" id="cinema" value="Cinema">
        <label class="btn btn-interesse" for="cinema">Cinema</label>

        <input type="checkbox" class="btn-check" id="series" value="Séries">
        <label class="btn btn-interesse" for="series">Séries</label>

        <input type="checkbox" class="btn-check" id="livros" value="Livros">
        <label class="btn btn-interesse" for="livros">Livros</label>

        <input type="checkbox" class="btn-check" id="viagens" value="Viagens">
        <label class="btn btn-interesse" for="viagens">Viagens</label>

        <input type="checkbox" class="btn-check" id="academia" value="Academia">
        <label class="btn btn-interesse" for="academia">Academia</label>

        <input type="checkbox" class="btn-check" id="corrida" value="Corrida">
        <label class="btn btn-interesse" for="corrida">Corrida</label>

        <input type="checkbox" class="btn-check" id="gastronomia" value="Gastronomia">
        <label class="btn btn-interesse" for="gastronomia">Gastronomia</label>

        <input type="checkbox" class="btn-check" id="tecnologia" value="Tecnologia">
        <label class="btn btn-interesse" for="tecnologia">Tecnologia</label>

        <input type="checkbox" class="btn-check" id="games" value="Games">
        <label class="btn btn-interesse" for="games">Games</label>

        <input type="checkbox" class="btn-check" id="praia" value="Praia">
        <label class="btn btn-interesse" for="praia">Praia</label>

        <input type="checkbox" class="btn-check" id="pets" value="Pets">
        <label class="btn btn-interesse" for="pets">Pets</label>
      </div>

      <div class="mb-3">
        <label for="objetivo" class="form-label">O que você busca no MatchConnect?</label>
        <select class="form-select" id="objetivo">
          <option value="">Selecione uma opção</option>
          <option value="Relacionamento sério">Relacionamento sério</option>
          <option value="Conhecer pessoas novas">Conhecer pessoas novas</option>
          <option value="Amizade">Amizade</option>
          <option value="Ainda não sei">Ainda não sei</option>
        </select>
      </div>

      <div class="mb-4">
        <label for="descricao" class="form-label">Fale um pouco sobre você</label>
        <textarea class="form-control" id="descricao" rows="3" placeholder="Ex: gosto de cinema, praia e conversas leves..."></textarea>
      </div>

      <button type="submit" class="btn btn-primary w-100"></button>

      <p id="mensagemInteresses" class="text-center fw-semibold mt-3"></p>
    </form>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
