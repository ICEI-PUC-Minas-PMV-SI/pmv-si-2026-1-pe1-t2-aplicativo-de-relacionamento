<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entrar | MatchConnect</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #FD51B3 0%, #8652F5 55%, #5EBBF6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }

        .login-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 430px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.2);
        }

        .logo-login {
            width: 150px;
            height: auto;
            margin-bottom: 10px;
        }

        .login-card h1 {
            color: #3d2d7a;
            font-weight: 700;
        }

        .btn-login {
            background-color: #3f7cff;
            color: #fff;
            border-radius: 30px;
            font-weight: 600;
            padding: 12px;
        }

        .btn-login:hover {
            background-color: #2f68df;
            color: #fff;
        }

        .link-cadastro {
            color: #8652F5;
            font-weight: 600;
            text-decoration: none;
        }

        .link-cadastro:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <main class="login-card">

        <div class="text-center mb-3">
            <a href="../../index.html">
                <img src="../../img/MatchConnectLOGO.PNG" alt="Logo MatchConnect" class="logo-login">
            </a>
        </div>

        <div class="text-center mb-4">
            <h1>Entrar</h1>
            <p class="text-muted mb-0">Acesse sua conta no MatchConnect.</p>
        </div>

        <form id="formLogin">
            <div class="mb-3">
                <label for="emailLogin" class="form-label">E-mail</label>
                <input type="email" class="form-control" id="emailLogin" placeholder="Digite seu e-mail">
            </div>

            <div class="mb-3">
                <label for="senhaLogin" class="form-label">Senha</label>
                <input type="password" class="form-control" id="senhaLogin" placeholder="Digite sua senha">
            </div>

            <p id="mensagemLogin" class="text-center fw-semibold"></p>

            <button type="submit" class="btn btn-login w-100">
                Entrar
            </button>
        </form>

        <p class="text-center mt-4 mb-0">
            Ainda não tem conta?
            <a href="../cadastro/cadastro.html" class="link-cadastro">Cadastre-se</a>
        </p>

    </main>

    <script src="Login.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
