<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar Usuário | MatchConnect</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #FD51B3 0%, #8652F5 55%, #5EBBF6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
    }

    .cadastro-card {
      background: #ffffff;
      border-radius: 24px;
      padding: 40px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.2);
    }

    .cadastro-card h1 {
      color: #3d2d7a;
      font-weight: 700;
    }

    .btn-cadastro {
      background-color: #3f7cff;
      color: #fff;
      border-radius: 30px;
      font-weight: 600;
      padding: 12px;
    }

    .btn-cadastro:hover {
      background-color: #2f68df;
      color: #fff;
    }

    .link-login {
      color: #8652F5;
      font-weight: 600;
      text-decoration: none;
    }

    .link-login:hover {
      text-decoration: underline;
    }
    
    .logo-img {
      max-width: 50%;
      height: auto;
    }

  </style>
</head>

<body>

  <main class="cadastro-card container mt-4">

  <h2 class="text-center mb-4">Complete seu perfil</h2>

  <form>

    <!-- Nome -->
    <div class="mb-2">
      <input type="text" class="form-control" placeholder="Nome">
    </div>

    <!-- Sexo e Gênero -->
    <div class="row mb-2">
      <div class="col">
        <input type="text" class="form-control" placeholder="Sexo">
      </div>
      <div class="col">
        <input type="text" class="form-control" placeholder="Gênero">
      </div>
    </div>

    <!-- Idade -->
    <div class="mb-2">
      <input type="number" class="form-control" placeholder="Idade">
    </div>

    <!-- Localização -->
    <div class="mb-2">
      <input type="text" class="form-control" placeholder="Localização">
    </div>

    <!-- Aniversário -->
    <div class="mb-2">
      <input type="date" class="form-control">
    </div>

    <!-- Religião -->
    <div class="mb-2">
      <input type="text" class="form-control" placeholder="Religião">
    </div>

    <!-- Intenção e Situação -->
    <div class="row mb-2">
      <div class="col">
        <input type="text" class="form-control" placeholder="Intenção no aplicativo">
      </div>
      <div class="col">
        <input type="text" class="form-control" placeholder="Situação Atual">
      </div>
    </div>

    <!-- Idiomas -->
    <div class="mb-2">
      <input type="text" class="form-control" placeholder="Idiomas">
    </div>

    <!-- Escolaridade -->
    <div class="mb-2">
      <input type="text" class="form-control" placeholder="Maior nível de escolaridade">
    </div>

    <!-- Profissão -->
    <div class="mb-2">
      <input type="text" class="form-control" placeholder="Profissão">
    </div>

    <!-- Bebida e Fuma -->
    <div class="row mb-2">
      <div class="col">
        <input type="text" class="form-control" placeholder="Bebe?">
      </div>
      <div class="col">
        <input type="text" class="form-control" placeholder="Fuma?">
      </div>
    </div>

    <!-- Fotos -->
    <div class="mb-3">
      <label class="form-label">Adicionar fotos</label>
      <input type="file" class="form-control">
    </div>

    <!-- Assistente -->
    <div class="mb-3">
      <textarea class="form-control" rows="3" placeholder="Assistente Virtual - Mapeamento de Interesses"></textarea>
    </div>

    <!-- Botão -->
    <button type="submit" class="btn btn-primary w-100">
      <a href="" class="link-destaque" style="color: white;">Avançar</a>
    </button>

  </form>
</main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
