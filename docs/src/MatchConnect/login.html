<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MatchConnect</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #FD51B3 0%, #8652F5 55%, #5EBBF6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .login-card {
            background: #ffffff;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.2);
        }

        .logo-container {
      text-align: center;
      margin-bottom: 25px;
         }  

        .log-image {
            max-width: 95%;
            width: 220px;
            height: auto;
            display: block;
            margin: 0 auto;
        }
    
        .login-card h1 {
            color: #3d2d7a;
            font-weight: 700;
            font-size: 1.8rem;
        }

        .btn-login {
            background-color: #3f7cff;
            color: #fff;
            border-radius: 30px;
            font-weight: 600;
            padding: 12px;
            transition:0,3s;
            border: none
        }

        .btn-login:hover {
            background-color: #2f68df;
            color: #fff;
        }

        .link-cadastro,
        .link-destaque {
            color: #8652F5;
            font-weight: 600;
            text-decoration: none;
        }

        .link-cadastro:hover,
        .link-destaque:hover {
            text-decoration: underline;
        }
        .esqueceu-senha {
            font-size: 0.9rem;
            text-align: right;
            display: block;
            margin-top: -10px;
        }
    </style>
</head>

<body>

    <main class="login-card">
        <div class="logo-container">
            <img src="Img/MatchConnectLOGO.PNG" alt="MatchConnect Logo" class="log-image">
        </div>

        <div class="text-center mb-4">
            <h1>Seja Bem Vindo!</h1>
            <p class="text-muted mb-0">Faça o login para continuar.</p>
        </div>

        <form id="formLogin">
            <div class="mb-3">
                <label for="emailLogin" class="form-label">E-mail</label>
                <input type="email" class="form-control" id="emailLogin" placeholder="Digite seu e-mail">
            </div>

            <div class="mb-3">
                <label for="senhaLogin" class="form-label">Senha</label>
                <div class="input-group">
                  <input type="password" class="form-control" id="senhaLogin" placeholder="Digite sua senha" required>
                  <button class="btn btn-outline-secondary" type="button" id="togglePassword">👁</button>
                </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" id="lembrar">
                  <label class="form-check-label" for="lembrar" style="font-size: 0.9rem;">
                    Lembrar de mim
                  </label>
                </div>
                <a href="#" class="link-destaque" style="font-size: 0.9rem; text-decoration: none;">Esqueceu a senha?</a>
            </div>

            <p id="mensagemLogin" class="text-center fw-semibold"></p>

            <button type="submit" class="btn btn-login w-100">
                Entrar
            </button>

            <div class="text-center mb-4 mt-4">
                <p class="text-muted mb-0">Ou logue com:</p>
                <div class="d-flex justify-content-center gap-2 flex-wrap mt-3">
                    <button class="btn btn-light border rounded-pill d-flex align-items-center gap-2 px-3 py-2" type="button">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg" width="18" alt="Google">
                    </button>
                    <button class="btn btn-light border rounded-pill d-flex align-items-center gap-2 px-3 py-2" type="button">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/facebook/facebook-original.svg" width="18" alt="Facebook">
                    </button>
                    <button class="btn btn-light border rounded-pill d-flex align-items-center gap-2 px-3 py-2" type="button">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/apple/apple-original.svg" width="18" alt="Apple">
                    </button>
                </div>
            </div>
        </form>

        <p class="text-center mt-4 mb-0">
            <a href="Cadastro.html" class="link-destaque">Realizar novo Cadastro!</a>
        </p>

        <footer class="text-center text-muted mt-4" style="font-size: 0.85rem;">
            © 2026 MatchConnect
        </footer>
    </main>

    <script src="Login.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('togglePassword').addEventListener('click', function() {
            const passwordInput = document.getElementById('senhaLogin');
            const toggleButton = this;
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleButton.textContent = '🙈';
            } else {
                passwordInput.type = 'password';
                toggleButton.textContent = '👁';
            }
        });
    </script>
</body>

</html>
